<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تواصل معنا | حداد الاحتراف بالرياض 0532744390</title>
  <meta name="description" content="تواصل مع حداد الاحتراف بالرياض الآن لطلب مقايسة أو تسعير مجاني لأعمال المظلات والسواتر والساندوتش بانل والألمنيوم. الرد سريع ومباشر على مدار اليوم.">
  <link rel="canonical" href="https://username.github.io/repo/contact-us.html">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Dynamic Header -->
  <header id="globalHeader"></header>

  <main>
    <section aria-label="معلومات التواصل">
      <h1 class="section-title">تواصل معنا الآن</h1>
      <p style="text-align: center; max-width: 700px; margin: 0 auto 30px auto;">يسعدنا دائماً تلبية طلباتكم والإجابة على استفساراتكم المتعلقة بالمظلات، السواتر، أعمال الألمنيوم والساندوتش بانل في كافة أحياء مدينة الرياض.</p>
    </section>

    <!-- Web3Forms Conversion Form -->
    <section class="form-section" aria-label="نموذج الاتصال التفاعلي">
      <h2 style="font-size: 1.3rem; margin-bottom: 20px; text-align: center; color: var(--primary-color);">أرسل لنا استفسارك مباشرة</h2>
      <form class="contact-form-element" action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="532744390">
        <input type="hidden" name="subject" value="رسالة جديدة من صفحة اتصل بنا">
        <input type="checkbox" name="botcheck" style="display: none;">

        <div class="form-group">
          <label for="contactName">الاسم الكريم:</label>
          <input type="text" id="contactName" name="name" class="form-control" placeholder="اسمك الكريم" required aria-required="true">
        </div>

        <div class="form-group">
          <label for="contactPhone">رقم الجوال:</label>
          <input type="tel" id="contactPhone" name="phone" class="form-control" placeholder="05xxxxxxxx" required aria-required="true" pattern="^(05|009665|9665)([0-9]{8})$">
        </div>

        <div class="form-group">
          <label for="contactMessage">تفاصيل الطلب أو الاستفسار:</label>
          <textarea id="contactMessage" name="message" class="form-control" rows="5" placeholder="اكتب هنا تفاصيل طلبك بالتفصيل لخدمتك بشكل أفضل..." required aria-required="true"></textarea>
        </div>

        <button type="submit" class="btn-submit">إرسال الطلب عبر البريد</button>
      </form>
    </section>
  </main>

  <!-- Dynamic Footer -->
  <div id="globalFooter"></div>

  <script src="script.js"></script>
</body>
</html>
